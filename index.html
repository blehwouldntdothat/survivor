<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Survivor Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Survivor Simulator</h1>

<div id="setup">
    <h2>Cast Setup</h2>
    <textarea id="castInput" rows="10" cols="40"
        placeholder="Enter contestants like:
Ava, https://i.imgur.com/abc123.png
Liam, https://example.com/liam.jpg
Noah"></textarea>
    <br>
    <button id="startBtn">Start Season</button>
</div>

<div id="game" style="display:none;">
    <h2>Season Progress</h2>
    <button id="nextEpisodeBtn">Run Next Episode</button>
    <div id="log"></div>
</div>

<!-- Modular systems -->
<script src="events.js"></script>
<script src="challenges.js"></script>
<script src="tiebreakers.js"></script>

<!-- Main game logic -->
<script src="script.js"></script>

</body>
</html>
