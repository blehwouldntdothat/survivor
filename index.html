<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Survivor Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Survivor Simulator</h1>

<!-- ============================
     MAIN MENU
     ============================ -->
<div id="mainMenu">

    <h2>Cast Setup</h2>

    <div id="addContestantForm">
        <input type="text" id="newName" placeholder="Name">
        <input type="text" id="newPhoto" placeholder="Image URL (optional)">
        <button id="addContestantBtn">Add Contestant</button>
    </div>

    <h3>Current Cast</h3>
    <div id="castList"></div>

    <div id="menuButtons">
        <button id="editStatsBtn">Edit All Stats</button>
        <button id="settingsBtn">Settings</button>
        <button id="startBtn">Start Season</button>
    </div>

</div>

<!-- ============================
     SETTINGS MENU
     ============================ -->
<div id="settingsMenu" style="display:none;">
    <h2>Settings</h2>

    <div class="settingsBlock">
        <label for="finaleSetting">Finale Type:</label>
        <select id="finaleSetting">
            <option value="random">Random (Default)</option>
            <option value="f2">Final 2</option>
            <option value="f3">Final 3</option>
        </select>
    </div>

    <div class="settingsBlock">
        <label for="idolMode">Hidden Immunity Idols:</label>
        <select id="idolMode">
            <option value="none">No Idols</option>
            <option value="one">One Idol Total</option>
            <option value="tribes" selected>One Per Tribe (No Rehide)</option>
        </select>
    </div>

    <div class="settingsBlock">
        <label for="idolExpire">Idol Expiration:</label>
        <select id="idolExpire">
            <option value="4">Final 4</option>
            <option value="5" selected>Final 5 (Default)</option>
            <option value="6">Final 6</option>
        </select>
    </div>

    <button id="saveSettingsBtn">Save Settings & Return</button>
</div>

<!-- ============================
     STAT EDITOR SCREEN
     ============================ -->
<div id="statEditor" style="display:none;">
    <h2>Edit All Stats</h2>

    <div id="statEditorContent"></div>

    <button id="saveStatsBtn">Save & Return</button>
</div>

<!-- ============================
     GAME SCREEN
     ============================ -->
<div id="game" style="display:none;">
    <h2>Season Progress</h2>
    <button id="nextEpisodeBtn">Run Next Episode</button>
    <div id="log"></div>
</div>

<script src="events.js"></script>
<script src="challenges.js"></script>
<script src="tiebreakers.js"></script>
<script src="script.js"></script>

</body>
</html>
